version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: file:./dev.db
      JWT_SECRET: your-super-secret-key-change-in-production
      PORT: "5000"
    volumes:
      - db-data:/app/prisma

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:5000

volumes:
  db-data:
    driver: local

networks:
  default:
    name: smart-attendance-network